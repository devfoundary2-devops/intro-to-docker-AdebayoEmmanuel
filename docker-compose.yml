services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
      - cache
    environment:
      DATABASE_URL: postgresql://demo:password@db/demo
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: password
      POSTGRES_DB: demo
    volumes:
      - db_data:/var/lib/postgresql/data
  cache:
    image: redis:7-alpine

volumes:
  db_data: